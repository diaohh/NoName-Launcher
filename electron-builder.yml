appId: com.nonamelauncher.app
productName: NoNameLauncher
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - "!out/**/*.map"
extraResources:
  - from: distribution.json
    to: distribution.json
win:
  target: nsis
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target: AppImage
  icon: resources/icon.png
mac:
  target: dmg
  icon: resources/icon.png
asar: true
